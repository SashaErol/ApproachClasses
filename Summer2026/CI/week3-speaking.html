<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Approach — Talk Time: News & Free Time Speaking Cards</title>
<style>
  :root{
    --navy:#0B1828;
    --blue:#0F2A47;
    --lightblue:#4289BD;
    --red:#9E251A;
    --gray:#E7E8EA;
    --paper:#FBFAF8;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:
      radial-gradient(circle at 15% 10%, rgba(66,137,189,0.16), transparent 45%),
      radial-gradient(circle at 90% 85%, rgba(158,37,26,0.12), transparent 40%),
      var(--navy);
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    color:var(--navy);
    padding:24px;
  }

  .stage{
    width:100%;
    max-width:760px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:18px;
  }

  .topbar{
    width:100%;
    display:flex;
    align-items:center;
    justify-content:space-between;
    color:#F2F4F6;
  }
  .brand{ display:flex; align-items:center; gap:10px; }
  .brand img{ width:34px; height:auto; display:block; }
  .brand-text{ line-height:1.1; }
  .brand-text .name{ font-weight:700; letter-spacing:1.5px; font-size:15px; color:#FFFFFF; }
  .brand-text .tag{ font-size:11px; color:#B9C4CE; font-style:italic; }
  .counter{
    font-size:14px;
    font-weight:600;
    color:#CFD8E0;
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.18);
    padding:6px 14px;
    border-radius:999px;
    letter-spacing:0.5px;
  }

  .dots{ display:flex; gap:9px; }
  .dot{
    width:9px;height:9px;border-radius:50%;
    background:rgba(255,255,255,0.22);
    transition:all .25s ease;
  }
  .dot.active{ background:var(--lightblue); width:22px; border-radius:6px; }
  .dot.done{ background:#7fa8c9; }

  .card{
    position:relative;
    width:100%;
    min-height:400px;
    background:var(--paper);
    border-radius:22px;
    box-shadow:0 30px 60px rgba(0,0,0,0.35), 0 2px 0 rgba(255,255,255,0.04) inset;
    padding:52px 48px 40px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    overflow:hidden;
    border-top:8px solid var(--lightblue);
  }
  .card::before{
    content:"";
    position:absolute;
    top:-60px; right:-60px;
    width:220px;height:220px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(66,137,189,0.10), transparent 70%);
  }
  .eyebrow{
    text-transform:uppercase;
    font-size:13px;
    font-weight:700;
    letter-spacing:3px;
    color:var(--red);
    margin-bottom:18px;
  }
  .question{
    font-size:clamp(26px, 4.2vw, 38px);
    line-height:1.32;
    font-weight:700;
    color:var(--navy);
    margin:0;
    position:relative;
    z-index:1;
  }
  .subtext{
    margin-top:18px;
    font-size:19px;
    color:var(--blue);
    line-height:1.4;
    position:relative;
    z-index:1;
  }
  .tag-recycled{
    display:inline-block;
    margin-top:22px;
    font-size:12px;
    font-weight:700;
    letter-spacing:1px;
    text-transform:uppercase;
    color:var(--lightblue);
    background:rgba(66,137,189,0.10);
    border:1px solid rgba(66,137,189,0.35);
    padding:4px 10px;
    border-radius:999px;
  }
  .hint{
    margin-top:28px;
    font-size:14px;
    color:#7a8794;
  }

  .def-word{
    cursor:pointer;
    border-bottom:2.5px dotted var(--lightblue);
    color:inherit;
    padding:0 1px;
    border-radius:3px;
    transition:background .15s ease;
  }
  .def-word:hover{ background:rgba(66,137,189,0.12); }
  .def-word.open{ background:rgba(66,137,189,0.18); }

  .tooltip{
    position:fixed;
    max-width:290px;
    background:var(--navy);
    color:#F2F6F9;
    padding:12px 16px;
    border-radius:12px;
    font-size:15px;
    line-height:1.4;
    font-weight:400;
    box-shadow:0 14px 30px rgba(0,0,0,0.35);
    z-index:50;
    opacity:0;
    transform:translateY(6px);
    pointer-events:none;
    transition:opacity .15s ease, transform .15s ease;
  }
  .tooltip.show{ opacity:1; transform:translateY(0); pointer-events:auto; }
  .tooltip b{
    color:var(--lightblue);
    text-transform:lowercase;
    display:block;
    margin-bottom:3px;
    font-size:13px;
    letter-spacing:0.5px;
  }
  .tooltip::after{
    content:"";
    position:absolute;
    bottom:-6px; left:22px;
    width:12px;height:12px;
    background:var(--navy);
    transform:rotate(45deg);
  }

  .controls{
    width:100%;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:14px;
  }
  button.nav{
    border:none;
    cursor:pointer;
    font-family:inherit;
    font-weight:700;
    font-size:15px;
    letter-spacing:0.4px;
    padding:14px 26px;
    border-radius:12px;
    transition:transform .12s ease, opacity .12s ease, background .12s ease;
  }
  button.nav:active{ transform:scale(0.97); }
  button.nav:disabled{ opacity:0.35; cursor:not-allowed; }
  .btn-prev{
    background:rgba(255,255,255,0.08);
    color:#E7E8EA;
    border:1px solid rgba(255,255,255,0.25);
  }
  .btn-prev:hover:not(:disabled){ background:rgba(255,255,255,0.16); }
  .btn-next{
    background:var(--red);
    color:#fff;
    box-shadow:0 10px 22px rgba(158,37,26,0.4);
  }
  .btn-next:hover{ background:#b32d20; }
  .btn-next.finished{ background:var(--lightblue); box-shadow:0 10px 22px rgba(66,137,189,0.4); }
  .btn-next.finished:hover{ background:#5497cc; }

  .done-card .question{ font-size:clamp(24px,4vw,32px); }

  @media (max-width:520px){
    .card{ padding:38px 26px 30px; min-height:340px; }
    .topbar{ flex-wrap:wrap; }
  }
  @media (prefers-reduced-motion: reduce){ *{ transition:none !important; } }
</style>
</head>

  },
  {
    html: 'What do you love doing in your free time? Do you prefer <span class="def-word" data-def="Full of energy and excitement (recycled from last week\u2019s article).">lively</span> activities, or do you like to relax instead?',
    recycled: 'Recycled word: lively',
  },
];

let i = 0;
const questionEl = document.getElementById('question');
const subtextEl = document.getElementById('subtext');
const recycledTagEl = document.getElementById('recycledTag');
const counterEl = document.getElementById('counter');
const dotsEl = document.getElementById('dots');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const card = document.getElementById('card');
const tooltip = document.getElementById('tooltip');

cards.forEach((_, idx) => {
  const d = document.createElement('div');
  d.className = 'dot';
  d.id = 'dot-' + idx;
  dotsEl.appendChild(d);
});

function render(){
  hideTooltip();
  const total = cards.length;
  const finished = i >= total;

  if(finished){
    card.classList.add('done-card');
    questionEl.innerHTML = '🎉 Great chat! You covered all 5 speaking cards.';
    subtextEl.style.display = 'none';
    recycledTagEl.style.display = 'none';
    counterEl.textContent = total + ' / ' + total;
    nextBtn.textContent = '↻ Start Again';
    nextBtn.classList.add('finished');
  } else {
    card.classList.remove('done-card');
    const c = cards[i];
    questionEl.innerHTML = c.html;
    subtextEl.style.display = 'none';
    if(c.recycled){
      recycledTagEl.textContent = c.recycled;
      recycledTagEl.style.display = 'inline-block';
    } else {
      recycledTagEl.style.display = 'none';
    }
    counterEl.textContent = (i+1) + ' / ' + total;
    nextBtn.textContent = (i === total - 1) ? 'Finish ✓' : 'Next →';
    nextBtn.classList.remove('finished');
  }

  prevBtn.disabled = (i === 0);

  cards.forEach((_, idx) => {
    const d = document.getElementById('dot-' + idx);
    d.classList.remove('active','done');
    if(!finished && idx === i) d.classList.add('active');
    else if(finished || idx < i) d.classList.add('done');
  });

  attachWordListeners();
}

function attachWordListeners(){
  document.querySelectorAll('.def-word').forEach(w => {
    w.addEventListener('click', (e) => {
      e.stopPropagation();
      const isOpen = w.classList.contains('open');
      document.querySelectorAll('.def-word.open').forEach(o => o.classList.remove('open'));
      if(isOpen){ hideTooltip(); return; }
      w.classList.add('open');
      showTooltip(w);
    });
  });
}

function showTooltip(wordEl){
  const def = wordEl.getAttribute('data-def');
  tooltip.innerHTML = '<b>meaning</b>' + def;
  tooltip.classList.add('show');
  const rect = wordEl.getBoundingClientRect();
  tooltip.style.left = 'auto';
  tooltip.style.top = 'auto';
  requestAnimationFrame(() => {
    const tw = tooltip.offsetWidth;
    let left = rect.left + rect.width/2 - tw/2;
    left = Math.max(12, Math.min(left, window.innerWidth - tw - 12));
    const top = rect.bottom + 12;
    tooltip.style.left = left + 'px';
    tooltip.style.top = top + 'px';
  });
}

function hideTooltip(){
  tooltip.classList.remove('show');
  document.querySelectorAll('.def-word.open').forEach(o => o.classList.remove('open'));
}

document.addEventListener('click', hideTooltip);
window.addEventListener('scroll', hideTooltip);
window.addEventListener('resize', hideTooltip);

nextBtn.addEventListener('click', () => {
  if(i >= cards.length){ i = 0; } else { i++; }
  render();
});
prevBtn.addEventListener('click', () => {
  if(i > 0){ i--; render(); }
});

render();
</script>
</body>
</html>
