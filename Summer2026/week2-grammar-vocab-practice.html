<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Week 2 Practice — Present Simple & Stative Verbs | The Approach</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,500&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy: #1B2A4A;
    --navy-soft: #2E4066;
    --sand: #C9A66B;
    --sand-pale: #F1E8D8;
    --paper: #FBF7EE;
    --buoy: #B23A2E;
    --wrong: #E4222D;
    --right: #2F7D5A;
    --ink: #22242B;
    --ink-soft: #5B5F6B;
    --line: rgba(27,42,74,0.16);
    --shadow: rgba(20,26,40,0.28);
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; height:100%; }
  body{
    font-family:'Work Sans', sans-serif;
    background:
      radial-gradient(circle at 15% 8%, rgba(178,58,46,0.05), transparent 45%),
      radial-gradient(circle at 85% 92%, rgba(27,42,74,0.06), transparent 50%),
      var(--sand-pale);
    color: var(--ink);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding: 26px 16px 44px;
  }

  .masthead{
    width:100%; max-width: 620px;
    display:flex; align-items:baseline; justify-content:space-between;
    margin-bottom: 16px; padding-bottom: 12px;
    border-bottom: 1px solid var(--line);
  }
  .brand{
    font-family:'Fraunces', serif; font-style:italic; font-weight:600;
    font-size: 15px; color: var(--navy); display:flex; align-items:center; gap:6px;
  }
  .brand-mark{ height:15px; width:auto; display:block; flex:none; }
  .masthead .tag{ font-size:10.5px; letter-spacing:0.14em; color:var(--ink-soft); text-transform:uppercase; }

  h1.title{
    width:100%; max-width:620px;
    font-family:'Fraunces', serif; font-weight:700;
    font-size: clamp(23px, 5.5vw, 30px);
    color: var(--navy); margin: 0 0 4px; line-height:1.1;
  }
  p.subtitle{
    width:100%; max-width:620px; margin:0 0 20px;
    font-size:13.5px; color:var(--ink-soft); line-height:1.5;
  }

  /* ---- scoreboard ---- */
  .scoreboard{
    width:100%; max-width:620px;
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom: 14px;
  }
  .score-chip{
    display:flex; align-items:center; gap:8px;
    font-weight:600; font-size:14px; color:var(--navy);
  }
  .score-chip .num{
    font-family:'Fraunces', serif; font-weight:700; font-size:20px; color:var(--buoy);
    min-width: 1.4em; text-align:right;
  }
  .progress-track{
    flex:1; margin: 0 16px; height:6px; border-radius:999px;
    background: rgba(27,42,74,0.12); overflow:hidden;
  }
  .progress-fill{
    height:100%; width:0%; background: var(--navy);
    transition: width .3s ease;
  }
  .counter{ font-size:12.5px; color:var(--ink-soft); font-weight:600; white-space:nowrap; }

  /* ---- card ---- */
  .stage{ width:100%; max-width:620px; position:relative; }

  .card{
    position:relative;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 22px 22px 24px;
    box-shadow: 0 1px 0 rgba(255,255,255,0.6) inset, 0 18px 34px -18px var(--shadow);
    transition: transform .25s cubic-bezier(.2,.7,.3,1), opacity .2s ease;
  }
  .card::before{
    content:"";
    position:absolute; inset:6px;
    border: 1px dashed rgba(27,42,74,0.15);
    border-radius: 5px;
    pointer-events:none;
  }
  .card.enter{ animation: fly-in .3s cubic-bezier(.2,.7,.3,1); }
  @keyframes fly-in{ from{ transform: translateX(60px); opacity:0; } to{ transform: translateX(0); opacity:1; } }
  .card.shake{ animation: shake .4s ease; }
  @keyframes shake{
    10%, 90% { transform: translateX(-2px); }
    20%, 80% { transform: translateX(4px); }
    30%, 50%, 70% { transform: translateX(-8px); }
    40%, 60% { transform: translateX(8px); }
  }

  .tag-row{ display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap; }
  .pill{
    font-size:10.5px; font-weight:700; letter-spacing:0.07em; text-transform:uppercase;
    padding: 4px 10px; border-radius:999px; border: 1.3px solid var(--navy); color: var(--navy);
  }
  .pill.vocab{ border-color: var(--buoy); color: var(--buoy); }

  .context{
    font-size: 12.5px; color: var(--ink-soft); font-style: italic; margin: 0 0 10px;
  }

  .sentence{
    font-family:'Fraunces', serif; font-weight:500;
    font-size: clamp(18px, 4.4vw, 22px);
    line-height: 1.4; color: var(--ink); margin: 0 0 18px;
  }
  .blank-slot{
    display:inline-block; min-width: 90px;
    border-bottom: 2px solid var(--navy);
    text-align:center; font-weight:700; color: var(--navy);
    padding: 0 4px;
  }
  .blank-slot.filled-right{ color: var(--right); border-color: var(--right); }
  .blank-slot.filled-wrong{ color: var(--wrong); border-color: var(--wrong); }

  .options{
    display:grid; grid-template-columns: 1fr 1fr; gap: 10px;
  }
  @media (max-width: 460px){ .options{ grid-template-columns: 1fr; } }

  .opt-btn{
    font-family:'Work Sans', sans-serif; font-weight:600; font-size: 15px;
    text-align:left;
    border: 1.6px solid var(--line); border-radius:6px;
    background: #fff; color: var(--ink);
    padding: 12px 14px; cursor:pointer;
    transition: border-color .15s, background .15s, transform .08s, color .15s;
    -webkit-tap-highlight-color: transparent;
  }
  .opt-btn:hover{ border-color: var(--navy); }
  .opt-btn:active{ transform: scale(0.98); }
  .opt-btn:disabled{ cursor:default; }

  .opt-btn.correct{
    background: rgba(47,125,90,0.1); border-color: var(--right); color: var(--right);
  }
  .opt-btn.wrong{
    background: var(--wrong); border-color: var(--wrong); color: #fff;
    animation: flash-wrong .35s ease;
  }
  @keyframes flash-wrong{
    0%{ background: #fff; color: var(--ink); }
    100%{ background: var(--wrong); color: #fff; }
  }
  .opt-btn.dim{ opacity: 0.45; }

  .feedback-row{
    display:flex; align-items:center; gap:8px;
    margin-top: 14px; min-height: 22px;
    font-size: 13.5px; font-weight:600;
  }
  .feedback-row.right{ color: var(--right); }
  .feedback-row.wrong{ color: var(--wrong); }
  .feedback-row svg{ width:16px; height:16px; flex:none; }

  .card-footer{
    margin-top: 16px; padding-top: 14px;
    border-top: 1px dashed rgba(27,42,74,0.14);
    display:flex; justify-content:flex-end;
  }

  button.next-btn{
    font-family:'Work Sans', sans-serif; font-weight:600; font-size:14px;
    border-radius:999px; border: 1.5px solid var(--navy);
    background: var(--navy); color: var(--paper);
    padding: 10px 20px; cursor:pointer;
    transition: background .15s, transform .1s;
    opacity: 0; pointer-events:none;
  }
  button.next-btn.show{ opacity:1; pointer-events:auto; }
  button.next-btn:hover{ background: var(--navy-soft); }
  button.next-btn:active{ transform: scale(0.97); }

  /* ---- results screen ---- */
  .results{
    display:none;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 34px 26px;
    text-align:center;
    box-shadow: 0 1px 0 rgba(255,255,255,0.6) inset, 0 18px 34px -18px var(--shadow);
  }
  .results.show{ display:block; }
  .results .big-score{
    font-family:'Fraunces', serif; font-weight:700; font-size: 44px; color: var(--navy);
    margin-bottom: 6px;
  }
  .results .msg{ font-size:14.5px; color: var(--ink-soft); margin-bottom: 22px; }
  button.restart-btn{
    font-family:'Work Sans', sans-serif; font-weight:600; font-size:14px;
    border-radius:999px; border: 1.5px solid var(--navy);
    background: var(--navy); color: var(--paper);
    padding: 12px 24px; cursor:pointer;
  }
  button.restart-btn:hover{ background: var(--navy-soft); }

  @media (prefers-reduced-motion: reduce){
    .card, .card.enter, .card.shake, .opt-btn.wrong{ animation:none !important; transition:none !important; }
  }
</style>
</head>

    tagRow.innerHTML = q.tags.map(tg => {
      const isVocab = tg === "Vocabulary";
      return `<span class="pill${isVocab ? ' vocab' : ''}">${tg}</span>`;
    }).join('');

    contextLine.textContent = q.context;
    sentenceEl.innerHTML = q.sentence.replace('_____', '<span class="blank-slot" id="blankSlot">?</span>');

    optionsEl.innerHTML = '';
    q.options.forEach((optText, i) => {
      const btn = document.createElement('button');
      btn.className = 'opt-btn';
      btn.textContent = optText;
      btn.addEventListener('click', () => selectAnswer(i));
      optionsEl.appendChild(btn);
    });

    feedbackRow.className = 'feedback-row';
    feedbackRow.innerHTML = '';
    nextBtn.classList.remove('show');

    counterEl.textContent = (idx + 1) + ' / ' + QUESTIONS.length;
    progressFill.style.width = ((idx) / QUESTIONS.length * 100) + '%';

    if(animate){
      cardEl.classList.remove('enter');
      void cardEl.offsetWidth;
      cardEl.classList.add('enter');
    }
  }

  function selectAnswer(i){
    if(answered) return;
    answered = true;

    const q = QUESTIONS[idx];
    const buttons = optionsEl.querySelectorAll('.opt-btn');
    const blankSlot = document.getElementById('blankSlot');
    const isCorrect = i === q.correct;

    buttons.forEach((b, bi) => {
      b.disabled = true;
      if(bi === q.correct){
        b.classList.add('correct');
      }
      if(bi === i && !isCorrect){
        b.classList.add('wrong');
      }
      if(bi !== i && bi !== q.correct){
        b.classList.add('dim');
      }
    });

    if(isCorrect){
      score++;
      scoreNum.textContent = score;
      blankSlot.textContent = q.options[q.correct];
      blankSlot.classList.add('filled-right');
      feedbackRow.classList.add('right');
      feedbackRow.innerHTML = checkIcon + '<span>Correct! Nice work.</span>';
    } else {
      blankSlot.textContent = q.options[q.correct];
      blankSlot.classList.add('filled-wrong');
      feedbackRow.classList.add('wrong');
      feedbackRow.innerHTML = xIcon + '<span>Not quite — the correct answer is "' + q.options[q.correct] + '".</span>';
      cardEl.classList.remove('shake');
      void cardEl.offsetWidth;
      cardEl.classList.add('shake');
    }

    progressFill.style.width = ((idx + 1) / QUESTIONS.length * 100) + '%';
    nextBtn.classList.add('show');
  }

  function goNext(){
    if(idx < QUESTIONS.length - 1){
      idx++;
      renderQuestion(true);
    } else {
      showResults();
    }
  }

  function showResults(){
    cardEl.style.display = 'none';
    resultsEl.classList.add('show');
    finalScore.textContent = score + ' / ' + QUESTIONS.length;
    const pct = score / QUESTIONS.length;
    let msg;
    if(pct === 1) msg = "Perfect score! You've mastered Week 2.";
    else if(pct >= 0.8) msg = "Great work! Just a few points to review.";
    else if(pct >= 0.5) msg = "Good effort — look back at the tricky ones with your teacher.";
    else msg = "Good practice! Review Week 2's grammar and vocabulary, then try again.";
    finalMsg.textContent = msg;
  }

  function restart(){
    idx = 0;
    score = 0;
    scoreNum.textContent = '0';
    resultsEl.classList.remove('show');
    cardEl.style.display = '';
    progressFill.style.width = '0%';
    renderQuestion(true);
  }

  nextBtn.addEventListener('click', goNext);
  restartBtn.addEventListener('click', restart);

  renderQuestion(false);
})();
</script>
</body>
</html>
