<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Speaking Cards — Summer & Celebrations</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0B1828;
    --redline:#9E251A;
    --navy:#0F2A47;
    --sky:#4289BD;
    --fog:#E8E8E8;
    --paper:#FFFFFF;
    --sky-tint:#eaf3fa;
    --sand:#f7f4ec;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    font-family:'Work Sans', sans-serif;
    color:var(--ink);
    background:
      radial-gradient(circle at 85% 8%, #ffe9b8 0%, rgba(255,233,184,0) 42%),
      linear-gradient(180deg, var(--sky-tint) 0%, var(--sand) 55%, #ffffff 100%);
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:28px 16px 40px;
  }
  header{
    text-align:center;
    max-width:560px;
    margin-bottom:26px;
  }
  .eyebrow{
    font-size:12px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--sky);
    font-weight:700;
    margin-bottom:8px;
  }
  h1{
    font-family:'Fraunces', serif;
    font-weight:700;
    font-size:clamp(22px,4vw,30px);
    margin:0 0 8px;
  }
  header p{
    margin:0;
    font-size:17px;
    color:#4a5566;
  }

  .deck{
    width:100%;
    max-width:520px;
    position:relative;
  }

  .progress-row{
    display:flex;
    justify-content:center;
    gap:8px;
    margin-bottom:16px;
  }
  .dot{
    width:9px;
    height:9px;
    border-radius:50%;
    background:var(--fog);
    transition:background .2s ease, transform .2s ease;
  }
  .dot.active{
    background:var(--redline);
    transform:scale(1.25);
  }
  .dot.done{background:var(--sky);}

  .card{
    background:var(--paper);
    border-radius:22px;
    padding:44px 34px 34px;
    box-shadow:0 18px 40px rgba(11,24,40,.12);
    border:1px solid #f0e7d2;
    position:relative;
    overflow:hidden;
    min-height:320px;
    display:flex;
    flex-direction:column;
  }
  .card::before{
    content:"";
    position:absolute;
    top:-60px;
    right:-60px;
    width:160px;
    height:160px;
    border-radius:50%;
    background:radial-gradient(circle, #ffe9b8 0%, rgba(255,233,184,0) 70%);
  }
  .card-number{
    font-family:'Fraunces', serif;
    font-size:15px;
    font-weight:700;
    color:var(--sky);
    letter-spacing:.06em;
    text-transform:uppercase;
    margin-bottom:12px;
    z-index:1;
  }
  .card-icon{
    width:52px;
    height:52px;
    margin-bottom:18px;
    z-index:1;
  }
  .card-title{
    font-family:'Fraunces', serif;
    font-weight:700;
    font-size:30px;
    margin:0 0 16px;
    z-index:1;
    color:var(--navy);
  }
  .card-text{
    font-size:20px;
    line-height:1.65;
    color:var(--ink);
    z-index:1;
    flex:1;
  }
  .speak-btn{
    align-self:flex-start;
    margin-top:18px;
    background:none;
    border:1.5px solid var(--sky);
    color:var(--sky);
    border-radius:20px;
    font-size:15px;
    padding:8px 16px;
    cursor:pointer;
    font-family:'Work Sans', sans-serif;
    font-weight:600;
    z-index:1;
  }
  .speak-btn:hover{background:var(--sky); color:var(--paper);}

  .nav-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:22px;
  }
  button.nav{
    background:var(--navy);
    color:var(--paper);
    border:none;
    border-radius:24px;
    padding:14px 26px;
    font-size:18px;
    font-weight:600;
    font-family:'Work Sans', sans-serif;
    cursor:pointer;
    transition:background .15s ease, opacity .15s ease;
  }
  button.nav:hover{background:var(--redline);}
  button.nav:disabled{
    opacity:.35;
    cursor:not-allowed;
  }
  .count-label{
    font-size:17px;
    color:#5a6577;
    font-weight:600;
  }

  @media (max-width:480px){
    .card{padding:34px 24px 28px;}
    .card-title{font-size:25px;}
    .card-text{font-size:18px;}
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">Approach International Student Center</div>
  <h1>Let's Talk 🌻</h1>
  <p>Warm-up speaking cards — no new vocabulary, just talk about you!</p>
</header>

<div class="deck">
  <div class="progress-row" id="progressRow"></div>
  <div class="card" id="card">
    <div class="card-number" id="cardNumber"></div>
    <div class="card-icon" id="cardIcon"></div>
    <h2 class="card-title" id="cardTitle"></h2>
    <p class="card-text" id="cardText"></p>
    <button class="speak-btn" id="speakBtn" type="button">🔊 Listen</button>
  </div>
  <div class="nav-row">
    <button class="nav" id="prevBtn">← Back</button>
    <span class="count-label" id="countLabel"></span>
    <button class="nav" id="nextBtn">Next →</button>
  </div>
</div>

<script>
const icons = {
  flag: `<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M10 4v40" stroke="#0F2A47" stroke-width="3" stroke-linecap="round"/><path d="M10 6c8-4 16 4 24 0v20c-8 4-16-4-24 0V6z" fill="#9E251A"/></svg>`,
  calendar: `<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="6" y="10" width="36" height="32" rx="4" fill="#4289BD"/><rect x="6" y="10" width="36" height="9" rx="4" fill="#0F2A47"/><rect x="14" y="4" width="4" height="10" rx="2" fill="#0F2A47"/><rect x="30" y="4" width="4" height="10" rx="2" fill="#0F2A47"/><circle cx="16" cy="30" r="2.5" fill="#fff"/><circle cx="24" cy="30" r="2.5" fill="#fff"/><circle cx="32" cy="30" r="2.5" fill="#fff"/></svg>`,
  sun: `<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="24" cy="24" r="10" fill="#f4b942"/><g stroke="#e69b1a" stroke-width="3" stroke-linecap="round"><line x1="24" y1="2" x2="24" y2="9"/><line x1="24" y1="39" x2="24" y2="46"/><line x1="2" y1="24" x2="9" y2="24"/><line x1="39" y1="24" x2="46" y2="24"/><line x1="8" y1="8" x2="13" y2="13"/><line x1="35" y1="35" x2="40" y2="40"/><line x1="8" y1="40" x2="13" y2="35"/><line x1="35" y1="13" x2="40" y2="8"/></g></svg>`,
  pin: `<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M24 4C15 4 8 11 8 20c0 13 16 24 16 24s16-11 16-24c0-9-7-16-16-16z" fill="#9E251A"/><circle cx="24" cy="19" r="6" fill="#fff"/></svg>`,
  compass: `<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="24" cy="24" r="19" fill="#0F2A47"/><circle cx="24" cy="24" r="15" fill="#eaf3fa"/><path d="M30 18l-4 8-8 4 4-8 8-4z" fill="#9E251A"/></svg>`
};

const cards = [
  {
    icon: icons.flag,
    title: "National Pride",
    text: "Every country has special symbols, like a flag or a national song. Is your country very patriotic? Do people celebrate their nation with pride?"
  },
  {
    icon: icons.calendar,
    title: "Important Celebrations",
    text: "Every culture has important celebrations and traditions. What is the most important celebration in your country? Why is it special for your family?"
  },
  {
    icon: icons.sun,
    title: "July with Family",
    text: "July is a special month for family time. What are your plans for July? Do you want to travel, relax, or celebrate with your family?"
  },
  {
    icon: icons.pin,
    title: "Places You've Visited",
    text: "Maybe you already visited some cities or monuments in the United States. What place did you visit? Was it a good experience?"
  },
  {
    icon: icons.compass,
    title: "Places You Want to Visit",
    text: "The United States has many famous and historic places. What place do you want to visit in the future? Why is it interesting for you?"
  }
];

let current = 0;

const progressRow = document.getElementById('progressRow');
const cardNumber = document.getElementById('cardNumber');
const cardIcon = document.getElementById('cardIcon');
const cardTitle = document.getElementById('cardTitle');
const cardText = document.getElementById('cardText');
const countLabel = document.getElementById('countLabel');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const speakBtn = document.getElementById('speakBtn');

cards.forEach((_, i) => {
  const dot = document.createElement('div');
  dot.className = 'dot';
  dot.dataset.i = i;
  progressRow.appendChild(dot);
});

function render(){
  const c = cards[current];
  cardNumber.textContent = `Card ${current + 1} of ${cards.length}`;
  cardIcon.innerHTML = c.icon;
  cardTitle.textContent = c.title;
  cardText.textContent = c.text;
  countLabel.textContent = `${current + 1} / ${cards.length}`;

  document.querySelectorAll('.dot').forEach((dot, i) => {
    dot.classList.toggle('active', i === current);
    dot.classList.toggle('done', i < current);
  });

  prevBtn.disabled = current === 0;
  nextBtn.textContent = current === cards.length - 1 ? 'Restart ↺' : 'Next →';
}

function speak(text){
  if(!('speechSynthesis' in window)) return;
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  u.rate = 0.92;
  const voices = speechSynthesis.getVoices();
  const usVoice = voices.find(v => v.lang === 'en-US');
  if(usVoice) u.voice = usVoice;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

prevBtn.addEventListener('click', () => {
  if(current > 0){ current--; render(); }
});

nextBtn.addEventListener('click', () => {
  if(current < cards.length - 1){ current++; }
  else { current = 0; }
  render();
});

speakBtn.addEventListener('click', () => speak(cards[current].text));

if('speechSynthesis' in window){
  speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
}

render();
</script>

</body>
</html>
