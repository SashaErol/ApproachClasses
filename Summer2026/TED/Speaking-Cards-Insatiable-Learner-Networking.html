<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Speaking Warm-Up | Approach</title>
<style>
  :root {
    --navy-dark: #0B1828;
    --navy-mid: #0F2A47;
    --red: #9E251A;
    --blue: #4289BD;
    --gray: #E8E8E8;
    --white: #FFFFFF;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: 'Georgia', 'Iowan Old Style', 'Palatino Linotype', serif;
    background: var(--navy-dark);
    color: var(--navy-dark);
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }

  .deck {
    width: 100%;
    max-width: 880px;
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
    padding: 0 6px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .brand img {
    height: 34px;
    width: auto;
    display: block;
  }

  .brand-name {
    color: var(--white);
    font-size: 15px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    opacity: 0.85;
  }

  .counter {
    color: var(--white);
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 15px;
    letter-spacing: 0.04em;
    opacity: 0.85;
  }

  .card {
    background: var(--white);
    border-radius: 6px;
    padding: 64px 56px;
    min-height: 380px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 20px 50px rgba(0,0,0,0.35);
    position: relative;
  }

  .card-number {
    position: absolute;
    top: 24px;
    left: 28px;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 13px;
    color: var(--blue);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 600;
  }

  .question {
    font-size: 30px;
    line-height: 1.5;
    color: var(--navy-dark);
    text-align: left;
  }

  .vocab {
    color: var(--red);
    font-weight: 700;
    border-bottom: 2px dotted var(--red);
    cursor: pointer;
    padding-bottom: 1px;
    position: relative;
  }

  .vocab.active {
    background: var(--gray);
  }

  .tooltip {
    display: none;
    position: absolute;
    left: 0;
    top: 100%;
    margin-top: 10px;
    background: var(--navy-mid);
    color: var(--white);
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 16px;
    line-height: 1.4;
    font-weight: 400;
    padding: 14px 18px;
    border-radius: 5px;
    width: 320px;
    max-width: 80vw;
    z-index: 10;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
  }

  .tooltip::before {
    content: "";
    position: absolute;
    top: -7px;
    left: 22px;
    border-left: 7px solid transparent;
    border-right: 7px solid transparent;
    border-bottom: 7px solid var(--navy-mid);
  }

  .vocab.active .tooltip {
    display: block;
  }

  .controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 22px;
    padding: 0 6px;
  }

  .dots {
    display: flex;
    gap: 8px;
  }

  .dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: rgba(255,255,255,0.25);
  }

  .dot.done {
    background: var(--blue);
  }

  .dot.current {
    background: var(--white);
  }

  button {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 15px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    font-weight: 600;
    padding: 13px 30px;
    border-radius: 4px;
    border: none;
    cursor: pointer;
    transition: opacity 0.15s ease;
  }

  button:disabled {
    opacity: 0.3;
    cursor: default;
  }

  #prevBtn {
    background: transparent;
    color: var(--white);
    border: 1px solid rgba(255,255,255,0.4);
  }

  #nextBtn {
    background: var(--blue);
    color: var(--white);
  }

  #nextBtn:hover:not(:disabled),
  #prevBtn:hover:not(:disabled) {
    opacity: 0.85;
  }

  @media (max-width: 600px) {
    .card { padding: 40px 26px; min-height: 300px; }
    .question { font-size: 23px; }
    .tooltip { width: 240px; font-size: 14px; }
  }
</style>
</head>

  <div class="card">
    <div class="card-number" id="cardNumber">SPEAKING WARM-UP</div>
    <div class="question" id="question"></div>
  </div>

  <div class="controls">
    <button id="prevBtn">Back</button>
    <div class="dots" id="dots"></div>
    <button id="nextBtn">Next</button>
  </div>
</div>

<script>
  const cards = [{"text": "Would you describe yourself as an <span class=\"vocab\" data-def=\"Someone who always wants to learn more and is never fully satisfied with what they already know.\">insatiable learner</span>? What subjects or skills do you always want to learn more about?"}, {"text": "Have you ever <span class=\"vocab\" data-def=\"Found or discovered something by chance, without looking for it.\">stumbled upon</span> an opportunity that changed your life? What happened?"}, {"text": "How has college (or another learning experience) helped <span class=\"vocab\" data-def=\"Expand your perspective; start considering new ideas or points of view you hadn't thought of before.\">broaden your way of thinking</span>? Can you think of one idea or opinion that changed after talking to classmates or professors?"}, {"text": "Think about your group of friends. Are they usually <span class=\"vocab\" data-def=\"Unwilling to change your opinion or behavior, even when others try hard to convince you.\">stubborn</span>, flexible, or somewhere in between? Tell your group about a time when you successfully <span class=\"vocab\" data-def=\"Convinced someone to do or believe something through reasoning or argument.\">persuaded</span> your friends\u2014or when they persuaded you\u2014to change your mind."}, {"text": "People sometimes use the expression <span class=\"vocab\" data-def=\"Making business connections in a relaxed, informal setting (like a golf course) rather than in a formal meeting.\">golf-course networking</span> to describe building professional relationships in informal settings. Where do you think people your age do <span class=\"vocab\" data-def=\"Building relationships with people that could help you professionally, now or in the future.\">networking</span> instead? Do casual conversations help create career opportunities?"}];
  let current = 0;

  const questionEl = document.getElementById('question');
  const counterEl = document.getElementById('counter');
  const dotsEl = document.getElementById('dots');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');

  function buildDots() {
    dotsEl.innerHTML = '';
    cards.forEach((_, i) => {
      const d = document.createElement('div');
      d.className = 'dot';
      d.id = 'dot-' + i;
      dotsEl.appendChild(d);
    });
  }

  function updateDots() {
    cards.forEach((_, i) => {
      const d = document.getElementById('dot-' + i);
      d.classList.remove('done', 'current');
      if (i < current) d.classList.add('done');
      if (i === current) d.classList.add('current');
    });
  }

  function render() {
    questionEl.innerHTML = cards[current].text;
    counterEl.textContent = (current + 1) + ' / ' + cards.length;
    prevBtn.disabled = current === 0;
    nextBtn.textContent = current === cards.length - 1 ? 'Restart' : 'Next';
    updateDots();
    attachVocabHandlers();
  }

  function attachVocabHandlers() {
    document.querySelectorAll('.vocab').forEach(el => {
      if (el.querySelector('.tooltip')) return;
      const tip = document.createElement('span');
      tip.className = 'tooltip';
      tip.textContent = el.getAttribute('data-def');
      el.appendChild(tip);
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        const wasActive = el.classList.contains('active');
        document.querySelectorAll('.vocab.active').forEach(v => v.classList.remove('active'));
        if (!wasActive) el.classList.add('active');
      });
    });
  }

  document.addEventListener('click', () => {
    document.querySelectorAll('.vocab.active').forEach(v => v.classList.remove('active'));
  });

  nextBtn.addEventListener('click', () => {
    if (current === cards.length - 1) {
      current = 0;
    } else {
      current++;
    }
    render();
  });

  prevBtn.addEventListener('click', () => {
    if (current > 0) {
      current--;
      render();
    }
  });

  buildDots();
  render();
</script>
